spring.application.name=backend

# ========================
# SQL Server Configuration (Unicode/UTF-8 fix)
# ========================
# sendStringParametersAsUnicode=true  -> gui String len DB duoi dang Unicode (NVARCHAR)
# characterEncoding=UTF-8             -> dam bao ket noi dung UTF-8
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=cinema;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;characterEncoding=UTF-8
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dam bao Hibernate dung UTF-8 khi xu ly ky tu
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# ========================
# Server Port
# ========================
server.port=8080

# ========================
# Spring Boot Servlet Encoding (UTF-8 fix)
# ========================
# Bat buoc tat ca request/response dung UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# ========================
# JWT Configuration
# ========================
app.jwt.secret=cinemaxp-super-secret-key-change-this-in-production-minimum-256-bits
app.jwt.expiration-ms=86400000

# ========================
# CORS (cho phep FE React goi API)
# ========================
app.cors.allowed-origins=http://localhost:5173
