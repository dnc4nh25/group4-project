spring.application.name=backend

# ========================
# SQL Server Configuration
# ========================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=cinema;encrypt=true;trustServerCertificate=true
spring.datasource.username=admin
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Server Port
# ========================
server.port=8080

# ========================
# JWT Configuration
# ========================
app.jwt.secret=cinemaxp-super-secret-key-change-this-in-production-minimum-256-bits
app.jwt.expiration-ms=86400000

# ========================
# CORS (cho phep FE React goi API)
# ========================
app.cors.allowed-origins=http://localhost:5173
